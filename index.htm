<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CAS Foundation Space</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        background-color: #f5f5f5;
        color: #333;
      }
      h1 {
        color: #0078d7;
      }
    </style>
    <script type="module">
      // target platform connection
      import { module as sciter } from "./env/desktop.sciter/code/index.mjs";
      import { module as vite } from "./env/web.vite/code/index.mjs";

      const environment = (function () {
        const rs = (function () {
          if (typeof Sciter !== "undefined") return ["desktop.sciter", sciter];
          return ["web.vite", vite];
        })();
        return { name: rs[0], module: rs[1] };
      })();

      // target package connection
      import { module as base } from "./packages/base/code/index.mjs";
      globalThis.CAS = { ...environment.module, ...base };
      console.log(CAS);
    </script>
  </head>
  <body>
    <h1>Welcome to Your Start Page</h1>
    <p>This file serves as the entry point for your application.</p>
  </body>
</html>
