<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CAS Foundation Space</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        background-color: #f5f5f5;
        color: #333;
      }
      h1 {
        color: #0078d7;
      }
    </style>
    <script type="module">
      import { module as envSciter } from "./env/desktop.sciter/code/index.mjs";
      import { module as envWeb } from "./env/web.vite/code/index.mjs";
      // import { base } from "env/desktop.sciter/code/module.mjs";

      window.config = "";
      fetch("tools/config/current.cfg")
        .then((response) => {
          if (!response.ok)
            throw new Error(`HTTP error! Status: ${response.status}`);
          return response.text();
        })
        .then((text) => {
          window.configText = text;
          console.log("Loaded config:", window.configText);
        })
        .catch((error) => {
          console.error("Error loading config:", error);
        });
    </script>
  </head>
  <body>
    <h1>Welcome to Your Start Page</h1>
    <p>This file serves as the entry point for your application.</p>
  </body>
</html>
